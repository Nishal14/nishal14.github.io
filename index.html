<script>
    // Resolve intro/skip state synchronously, before the overlay or hero
    // markup below is even parsed — avoids any flash of the overlay when
    // arriving via index.html#hero (e.g. clicking the logo from another page).
    if (window.location.hash === '#hero') {
        document.documentElement.classList.add('skip-intro');
        history.replaceState(null, '', window.location.pathname + window.location.search);
    } else {
        document.body.classList.add('intro-pending');
    }
</script>
